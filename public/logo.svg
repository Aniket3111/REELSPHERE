<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradRS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="#0b0f1a"/>

  <!-- Orbit ring -->
  <ellipse cx="128" cy="128" rx="110" ry="40"
           fill="none"
           stroke="url(#gradRS)"
           stroke-width="10"
           transform="rotate(-20 128 128)" />

  <!-- RS Text -->
  <text x="128" y="150"
        text-anchor="middle"
        font-size="110"
        font-family="Poppins, Arial, sans-serif"
        font-weight="700"
        fill="url(#gradRS)">
    RS
  </text>
</svg>